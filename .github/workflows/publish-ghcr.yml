name: Publish fork image to GHCR

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish commit-addressed image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out the triggering commit
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          git init .
          git remote add origin "https://github.com/${REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Authenticate to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build and publish image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="sha-${GITHUB_SHA}"
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${SOURCE_URL}" \
            --tag "${IMAGE}:${SHA_TAG}" \
            --tag "${IMAGE}:master" \
            .
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:master"
